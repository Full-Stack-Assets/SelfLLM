[pytest]
minversion = 7.0
addopts =
    -ra
    --strict-markers
    --tb=short
    -q
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (skipped in fast CI; run with --run-slow)
    gpu: marks tests requiring a CUDA GPU (auto-skip when unavailable)
    integration: marks end-to-end integration tests
    unit: marks fast, isolated unit tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:torch
    ignore::RuntimeWarning:torch
