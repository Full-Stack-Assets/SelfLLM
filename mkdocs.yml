site_name: SelfLLM
site_description: A recursively self-improving foundation language model
site_url: https://full-stack-assets.github.io/SelfLLM/
repo_url: https://github.com/Full-Stack-Assets/SelfLLM
repo_name: Full-Stack-Assets/SelfLLM
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Guides:
      - Custom Provider: CUSTOM_PROVIDER.md
  - Specifications:
      - SPEC v4: SPEC-v4.md
      - SPEC v3: SPEC-v3.md
  - Plans:
      - Plan v4: plan-v4.md
      - Plan v3: plan-v3.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true

plugins:
  - search
